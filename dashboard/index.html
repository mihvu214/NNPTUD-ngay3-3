<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Product Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sortable {
            cursor: pointer;
        }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container py-4">

    <h2 class="text-center mb-4">Product Dashboard</h2>

    <!-- Search + Limit -->
    <div class="row g-3 mb-3">
        <div class="col-md-6">
            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Search by title..."
                   onchange="handleSearch()">
        </div>

        <div class="col-md-3">
            <select id="limitSelect"
                    class="form-select"
                    onchange="changeLimit()">
                <option value="5">5 items</option>
                <option value="10" selected>10 items</option>
                <option value="20">20 items</option>
            </select>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark text-center">
            <tr>
                <th>Image</th>
                <th class="sortable" onclick="sortBy('title')">
                    Title ⇅
                </th>
                <th class="sortable" onclick="sortBy('price')">
                    Price ⇅
                </th>
                <th>Category</th>
            </tr>
            </thead>

            <tbody id="productTable"></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav>
        <ul class="pagination justify-content-center"
            id="pagination"></ul>
    </nav>

</div>

<script>

let products = [];
let filteredProducts = [];

let currentPage = 1;
let limit = 10;
let sortField = null;
let sortDirection = 1;

const PLACEHOLDER =
"data:image/svg+xml;utf8," +
"<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'>" +
"<rect width='60' height='60' fill='%23e9ecef'/></svg>";

/* ================= FETCH API ================= */

fetch("https://api.escuelajs.co/api/v1/products")
.then(res => res.json())
.then(data => {
    products = data;
    filteredProducts = [...products];
    renderTable();
});

/* ================= RENDER TABLE ================= */

function renderTable() {

    const table = document.getElementById("productTable");
    table.innerHTML = "";

    const start = (currentPage - 1) * limit;
    const pageData = filteredProducts.slice(start, start + limit);

    pageData.forEach(product => {

        const image = safeImage(product.images)
            || product.category?.image
            || PLACEHOLDER;

        const row = document.createElement("tr");

        // tooltip bootstrap (description hidden)
        row.setAttribute("data-bs-toggle","tooltip");
        row.setAttribute("data-bs-placement","top");
        row.setAttribute("title", product.description);

        row.innerHTML = `
            <td class="text-center">
                <img src="${image}" class="product-img">
            </td>

            <td class="fw-semibold">
                ${product.title}
            </td>

            <td class="text-center">
                $${product.price}
            </td>

            <td class="text-center">
                ${product.category?.name ?? ""}
            </td>
        `;

        table.appendChild(row);
    });

    enableTooltips();
    renderPagination();
}

/* ================= SEARCH ================= */

function handleSearch() {
    const keyword =
        document.getElementById("searchInput")
        .value.toLowerCase();

    filteredProducts = products.filter(p =>
        p.title.toLowerCase().includes(keyword)
    );

    currentPage = 1;
    renderTable();
}

/* ================= SORT ================= */

function sortBy(field) {

    if (sortField === field)
        sortDirection *= -1;
    else {
        sortField = field;
        sortDirection = 1;
    }

    filteredProducts.sort((a,b)=>{

        if(a[field] < b[field]) return -1*sortDirection;
        if(a[field] > b[field]) return 1*sortDirection;
        return 0;
    });

    renderTable();
}

/* ================= PAGINATION ================= */

function renderPagination() {

    const totalPages =
        Math.ceil(filteredProducts.length / limit);

    const pagination =
        document.getElementById("pagination");

    pagination.innerHTML = "";

    for(let i=1;i<=totalPages;i++){
        pagination.innerHTML += `
            <li class="page-item ${i===currentPage?'active':''}">
                <button class="page-link"
                        onclick="goToPage(${i})">${i}</button>
            </li>`;
    }
}

function goToPage(page){
    currentPage = page;
    renderTable();
}

/* ================= LIMIT ================= */

function changeLimit(){
    limit = parseInt(
        document.getElementById("limitSelect").value
    );
    currentPage = 1;
    renderTable();
}

/* ================= IMAGE SAFE ================= */

function safeImage(images){
    if(!Array.isArray(images)) return "";
    return images.find(x => typeof x==="string") || "";
}

/* ================= TOOLTIP ================= */

function enableTooltips(){
    const tooltipTriggerList =
        [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));

    tooltipTriggerList.map(el =>
        new bootstrap.Tooltip(el));
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
