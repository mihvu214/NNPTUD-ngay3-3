<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS riêng -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">Product Dashboard</h2>

<div class="row mb-3">
    <div class="col-md-6">
        <input id="searchInput" class="form-control"
            placeholder="Search by title...">
    </div>

    <div class="col-md-3">
        <select id="limitSelect" class="form-select">
            <option value="5">5 items</option>
            <option value="10" selected>10 items</option>
            <option value="20">20 items</option>
        </select>
    </div>
</div>

<table class="table table-bordered table-hover bg-white">
<thead class="table-dark">
<tr>
    <th>ID</th>
    <th id="sortTitle" class="sortable">Title ⬍</th>
    <th id="sortPrice" class="sortable">Price ⬍</th>
    <th>Category</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<nav>
<ul class="pagination" id="pagination"></ul>
</nav>

</div>

<div id="tooltip" class="tooltip-desc"></div>

<script>

let products = [];
let filtered = [];

let currentPage = 1;
let limit = 10;
let sortField = "";
let sortAsc = true;

const tooltip = document.getElementById("tooltip");

// ===== FETCH DATA =====
async function loadData() {
    const res = await fetch("https://api.escuelajs.co/api/v1/products");
    products = await res.json();
    filtered = [...products];
    render();
}
loadData();

// ===== SEARCH =====
searchInput.oninput = (e) => {
    const keyword = e.target.value.toLowerCase();

    filtered = products.filter(p =>
        p.title.toLowerCase().includes(keyword)
    );

    currentPage = 1;
    render();
};

// ===== LIMIT =====
limitSelect.onchange = (e) => {
    limit = Number(e.target.value);
    currentPage = 1;
    render();
};

// ===== SORT =====
function sortBy(field){
    if(sortField === field)
        sortAsc = !sortAsc;
    else{
        sortField = field;
        sortAsc = true;
    }

    filtered.sort((a,b)=>{
        if(a[field] < b[field]) return sortAsc?-1:1;
        if(a[field] > b[field]) return sortAsc?1:-1;
        return 0;
    });

    render();
}

sortTitle.onclick = ()=>sortBy("title");
sortPrice.onclick = ()=>sortBy("price");

// ===== RENDER TABLE =====
function render(){

    const start = (currentPage-1)*limit;
    const pageData = filtered.slice(start,start+limit);

    tableBody.innerHTML="";

    pageData.forEach(product=>{

        const tr=document.createElement("tr");

        tr.innerHTML=`
            <td>${product.id}</td>
            <td>${product.title}</td>
            <td>$${product.price}</td>
            <td>${product.category.name}</td>
        `;

        tr.onmousemove=(e)=>{
            tooltip.style.display="block";
            tooltip.style.left=e.pageX+15+"px";
            tooltip.style.top=e.pageY+15+"px";
            tooltip.innerText=product.description;
        };

        tr.onmouseleave=()=>{
            tooltip.style.display="none";
        };

        tableBody.appendChild(tr);
    });

    renderPagination();
}

// ===== PAGINATION =====
function renderPagination(){

    const totalPages=Math.ceil(filtered.length/limit);
    pagination.innerHTML="";

    for(let i=1;i<=totalPages;i++){

        const li=document.createElement("li");
        li.className="page-item "+(i===currentPage?"active":"");

        li.innerHTML=`<a class="page-link">${i}</a>`;

        li.onclick=()=>{
            currentPage=i;
            render();
        };

        pagination.appendChild(li);
    }
}

</script>

</body>
</html>
